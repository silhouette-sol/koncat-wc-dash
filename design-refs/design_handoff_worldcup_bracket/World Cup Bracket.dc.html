<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  html, body { margin: 0; padding: 0; background: #08090c; height: 100%; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</helmet>
<div data-screen-label="World Cup bracket" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #08090c;">
  <div style="position: relative; width: min(100vw, 100vh); height: min(100vw, 100vh);">
    <x-import component="BracketEngine" from="./BracketEngine.jsx" theme="{{ theme }}" accent="{{ accent }}" labels="{{ labels }}" hint-size="100%,100%"></x-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1000, &quot;height&quot;: 1000}, &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;carbon&quot;, &quot;stadium&quot;, &quot;mono&quot;], &quot;default&quot;: &quot;carbon&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Look&quot;}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E8B24A&quot;, &quot;options&quot;: [&quot;#E8B24A&quot;, &quot;#3B82F6&quot;, &quot;#10B981&quot;, &quot;#EDEDED&quot;], &quot;section&quot;: &quot;Look&quot;}, &quot;labels&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Look&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      theme: this.props.theme || 'carbon',
      accent: this.props.accent || '#E8B24A',
      labels: this.props.labels !== false,
    };
  }
}
</script>
</body>
</html>
